name: Publish to NPM

on:
  push:
    tags:
      - '@*/*@[0-9]*'

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build every workspace package up front so the packed
      # package resolves its workspace dependencies to real
      # bundled declarations. The install-time `prepare` leaves
      # unbuilt packages as jiti stubs whose `.d.mts` re-exports
      # from `./src/*.ts`; api-extractor then follows the stub
      # into TypeScript source and aborts the prepack build.
      - name: Build workspace
        run: pnpm build
      - name: Publish ${{ github.ref_name }}
        run: pnpm --filter "${TAG%@*}" --fail-if-no-match publish:maybe --provenance --no-git-checks
        env:
          TAG: ${{ github.ref_name }}
